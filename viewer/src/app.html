<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: asset:; connect-src ipc: http://ipc.localhost;" />
    <title>Watermelon Vector Viewer</title>
    %sveltekit.head%
  </head>
  <body oncontextmenu="return false">
    <!--
      Static fallback content — completely independent of Svelte/JS having
      worked. Shown by default; hidden the instant Svelte actually mounts
      (see the inline script below). If the JS bundle fails to load, throws
      before mounting, or WebView2 itself can't execute script at all, this
      is what the user actually sees, instead of a blank white window.
    -->
    <div id="wvgc-fallback" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      background: #15181C; color: #9AA5B1; padding: 24px; gap: 8px;
    ">
      <div style="font-size: 32px;">⚠</div>
      <div style="font-size: 15px; font-weight: 600; color: #E6E9ED;">
        Watermelon Vector Viewer couldn't start
      </div>
      <div style="font-size: 13px; max-width: 420px;">
        This usually means the Microsoft Edge WebView2 Runtime is missing
        or damaged on this PC. Reinstalling Watermelon Vector Converter
        should repair it automatically.
      </div>
    </div>

    <div style="display: contents">%sveltekit.body%</div>

    <script>
      // Real mounting signal: SvelteKit's hydration replaces the content
      // inside the wrapper div above with actual rendered markup. If that
      // wrapper ever contains more than whitespace, the app mounted — hide
      // the fallback. Checked shortly after load rather than on a fixed
      // assumption, so slower machines still get a fair chance to mount
      // before we conclude something's wrong.
      (function () {
        function appearsToHaveMounted() {
          var wrappers = document.querySelectorAll('body > div[style*="display: contents"]');
          for (var i = 0; i < wrappers.length; i++) {
            if (wrappers[i].textContent.trim().length > 0 || wrappers[i].querySelector('*')) {
              return true;
            }
          }
          return false;
        }
        function checkOnce() {
          var fallback = document.getElementById('wvgc-fallback');
          if (!fallback) return;
          if (appearsToHaveMounted()) {
            fallback.style.display = 'none';
          }
        }
        // Poll briefly rather than a single fixed timeout — mounting time
        // varies with machine speed and file size, and this costs nothing
        // once the app has actually mounted (checks stop immediately).
        var attempts = 0;
        var interval = setInterval(function () {
          checkOnce();
          attempts++;
          var fallback = document.getElementById('wvgc-fallback');
          if (!fallback || fallback.style.display === 'none' || attempts > 100) {
            clearInterval(interval);
          }
        }, 100);
      })();
    </script>
  </body>
</html>
