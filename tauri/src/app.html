<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: asset:; connect-src ipc: http://ipc.localhost;" />
    <title>Watermelon Vector Converter</title>
    %sveltekit.head%
  </head>
  <body oncontextmenu="return false">
    <!--
      Static fallback content — see viewer/src/app.html for the full
      rationale. Same mechanism applied here for consistency: if the JS
      bundle fails to mount, this shows instead of a blank window.
    -->
    <div id="wvgc-fallback" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      background: #15181C; color: #9AA5B1; padding: 24px; gap: 8px;
    ">
      <div style="font-size: 32px;">⚠</div>
      <div style="font-size: 15px; font-weight: 600; color: #E6E9ED;">
        Watermelon Vector Converter couldn't start
      </div>
      <div style="font-size: 13px; max-width: 420px;">
        This usually means the Microsoft Edge WebView2 Runtime is missing
        or damaged on this PC. Try reinstalling the app.
      </div>
    </div>

    <div style="display: contents">%sveltekit.body%</div>

    <script>
      (function () {
        function appearsToHaveMounted() {
          var wrappers = document.querySelectorAll('body > div[style*="display: contents"]');
          for (var i = 0; i < wrappers.length; i++) {
            if (wrappers[i].textContent.trim().length > 0 || wrappers[i].querySelector('*')) {
              return true;
            }
          }
          return false;
        }
        var attempts = 0;
        var interval = setInterval(function () {
          var fallback = document.getElementById('wvgc-fallback');
          if (!fallback) { clearInterval(interval); return; }
          if (appearsToHaveMounted()) {
            fallback.style.display = 'none';
            clearInterval(interval);
            return;
          }
          attempts++;
          if (attempts > 100) clearInterval(interval);
        }, 100);
      })();
    </script>
  </body>
</html>
