# Build pipeline: Rust core (.so via cargo-ndk) + signed release APK + GitHub Release.
name: android

on:
  push:
    paths: [ "android/**", "svg-converter-core/**", ".github/workflows/android.yml" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Rust core (.so for arm64-v8a)
        working-directory: svg-converter-core
        run: cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Gradle — unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode \
            > $GITHUB_WORKSPACE/digital_raven_release.jks

      - name: Gradle — assemble signed release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/digital_raven_release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName android/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (Android)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.version }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Android"
          body: |
            ## Watermelon Vector Converter — Android APK
            Signed release APK for Android (arm64-v8a).

            ### Install
            - Download `wvgc-release.apk` below
            - Enable "Install from unknown sources" on your device
            - Open the APK to install

            ### Distribution
            Available on Cafebazaar and Myket for Iranian users.
          files: android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true

  instrumented:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-linux-android,x86_64-linux-android" }
      - run: cargo install cargo-ndk --locked
      - uses: android-actions/setup-android@v3
      - name: Build Rust core incl. x86_64 (emulator ABI)
        working-directory: svg-converter-core
        run: cargo ndk -t arm64-v8a -t x86_64 -o ../android/app/src/main/jniLibs build --release
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          cores: 2
          emulator-boot-timeout: 600
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            sleep 15
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
            cd android && ./gradlew connectedDebugAndroidTest