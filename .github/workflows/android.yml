name: android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Rust core (all ABI targets)
        working-directory: svg-converter-core
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86_64 \
            -t x86 \
            -o ../android/app/src/main/jniLibs \
            build --release

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode \
            > $GITHUB_WORKSPACE/digital_raven_release.jks

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Gradle assemble signed universal release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/digital_raven_release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Get version name
        id: version
        # Always run, even if the Gradle build above failed — we still want
        # whatever partial outputs exist to be picked up by the artifact
        # upload step below, so a failed run is inspectable instead of
        # vanishing with nothing to show for it.
        if: always()
        run: |
          VERSION=$(grep versionName android/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK file
        id: rename
        if: always()
        run: |
          ORIGINAL="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$ORIGINAL" ]; then
            NEW_NAME="android/app/build/outputs/apk/release/Watermelon_vector_converter_v${{ steps.version.outputs.version }}_app-release.apk"
            mv "$ORIGINAL" "$NEW_NAME"
            echo "apk_path=$NEW_NAME" >> $GITHUB_OUTPUT
          else
            echo "apk_path=" >> $GITHUB_OUTPUT
          fi

      - name: List APK outputs
        if: always()
        run: find android/app/build/outputs/apk/release/ -name "*.apk" || true

      # Publishes the APK as a downloadable workflow-run artifact regardless
      # of whether the run ends up green enough to cut a tagged release.
      # This is what lets you pull down "the last build" even when a later
      # step (or a compile error elsewhere) would otherwise mean nothing was
      # ever published. Kept alongside the release step below — this does
      # NOT replace it, both run.
      - name: Upload APK artifact (always, no release/tag)
        if: always() && steps.rename.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 14

      - name: Create GitHub Release Android
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.version }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} Android"
          body: |
            ## Watermelon Vector Converter Android APK

            Signed release APK. Supports all Android processor architectures:
            - arm64-v8a all modern Android phones (2016+)
            - armeabi-v7a older Android phones
            - x86_64 Android emulators, some Chromebooks
            - x86 older emulators

            ### Install
            1. Download the newly named APK below
            2. Enable "Install from unknown sources" on your device
            3. Open the APK to install

            ### Iranian app stores
            Also available on Cafebazaar and Myket.

            Minimum Android: 8.0 (API 26) Target: Android 15 (API 35)
          files: ${{ steps.rename.outputs.apk_path }}
          fail_on_unmatched_files: true

  instrumented:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android" }
      - run: cargo install cargo-ndk --locked
      - uses: android-actions/setup-android@v3
      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew
      - name: Clean previous builds
        working-directory: android
        run: ./gradlew clean
      - name: Build Rust core (all 4 ABIs for reliable testing)
        working-directory: svg-converter-core
        run: cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o ../android/app/src/main/jniLibs build --release
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          cores: 2
          emulator-boot-timeout: 600
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            sleep 15
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
            sleep 5
            adb shell 'while [[ -z $(getprop ro.build.version.sdk) ]]; do sleep 2; done'
            adb shell input keyevent 82
            cd android && ./gradlew connectedDebugAndroidTest