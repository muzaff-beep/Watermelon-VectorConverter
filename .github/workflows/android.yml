# Build the Android APK: Rust core (.so via cargo-ndk) + Gradle assemble + tests.
name: android

on:
  push:
    paths: [ "android/**", "svg-converter-core/**", ".github/workflows/android.yml" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Rust core (arm64-v8a debug)
        working-directory: svg-converter-core
        run: |
          cargo ndk -t arm64-v8a \
            -o ../android/app/src/main/jniLibs build

      - name: Gradle — assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wvgc-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
