# Builds the Tauri desktop app for Windows, Linux, and macOS.
name: desktop

on:
  push:
    paths: [ "tauri/**", "svg-converter-core/**", ".github/workflows/desktop.yml" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact-name: wvgc-windows
            artifact-path: tauri/src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            args: ""
            artifact-name: wvgc-linux
            artifact-path: tauri/src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact-name: wvgc-macos
            artifact-path: tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build Tauri app
        working-directory: tauri
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: warn