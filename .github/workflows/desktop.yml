# Builds the Tauri desktop app for Windows (NSIS installer + MSI).
name: desktop

on:
  push:
    paths: [ "tauri/**", "svg-converter-core/**", ".github/workflows/desktop.yml" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build Tauri app (Windows)
        working-directory: tauri
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: wvgc-windows-installer
          path: tauri/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: wvgc-windows-msi
          path: tauri/src-tauri/target/release/bundle/msi/*.msi
