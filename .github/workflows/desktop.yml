# Builds Tauri desktop apps (converter + viewer) for Windows, Linux, macOS + GitHub Releases.
name: desktop

on:
  push:
    paths: [ "tauri/**", "viewer/**", "svg-converter-core/**", ".github/workflows/desktop.yml" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            bundles: nsis,msi
          - os: ubuntu-22.04
            label: Linux
            bundles: appimage,deb
          - os: macos-latest
            label: macOS
            bundles: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Converter ──
      - name: Install converter frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build converter
        working-directory: tauri
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ── Viewer ──
      - name: Install viewer frontend dependencies
        working-directory: viewer
        run: npm install

      - name: Build viewer
        working-directory: viewer
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('tauri/src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List bundle outputs
        shell: bash
        run: |
          find target/release/bundle -type f \( \
            -name "*.exe" -o -name "*.msi" -o \
            -name "*.AppImage" -o -name "*.deb" -o \
            -name "*.dmg" \) | sort

      - name: Upload release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter + Viewer — Desktop (${{ matrix.label }})

            Two apps in this release:
            - **Watermelon Vector Converter** — SVG → VectorDrawable conversion
            - **Watermelon Vector Viewer** — double-click any `.svg` to preview it instantly

            Both share the same Rust conversion core. Install both from the files below;
            the viewer registers itself as the default `.svg` handler during setup.
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true

      - name: Upload release (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter + Viewer — Desktop (${{ matrix.label }})

            Two apps in this release: the converter and a lightweight SVG viewer.
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          fail_on_unmatched_files: true

      - name: Upload release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter + Viewer — Desktop (${{ matrix.label }})

            Two apps in this release: the converter and a lightweight SVG viewer.
          files: target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
