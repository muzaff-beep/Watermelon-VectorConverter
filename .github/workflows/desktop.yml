# Builds Tauri desktop app for Windows, Linux, macOS + GitHub Releases.
name: desktop

on:
  push:
    paths: [ "tauri/**", "svg-converter-core/**", ".github/workflows/desktop.yml" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            bundles: nsis,msi
          - os: ubuntu-22.04
            label: Linux
            bundles: appimage,deb
          - os: macos-latest
            label: macOS
            bundles: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build Tauri app
        working-directory: tauri
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('tauri/src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List bundle outputs
        shell: bash
        run: |
          find tauri/src-tauri/target/release/bundle -type f \( \
            -name "*.exe" -o -name "*.msi" -o \
            -name "*.AppImage" -o -name "*.deb" -o \
            -name "*.dmg" \) | sort

      - name: Collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p /tmp/release-artifacts
          find tauri/src-tauri/target/release/bundle -type f \( -name "*.exe" -o -name "*.msi" \) \
            -exec cp {} /tmp/release-artifacts/ \;
          ls /tmp/release-artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p /tmp/release-artifacts
          find tauri/src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} /tmp/release-artifacts/ \;
          ls /tmp/release-artifacts/

      - name: Collect artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p /tmp/release-artifacts
          find tauri/src-tauri/target/release/bundle -type f -name "*.dmg" \
            -exec cp {} /tmp/release-artifacts/ \;
          ls /tmp/release-artifacts/

      - name: Create GitHub Release (${{ matrix.label }})
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter — Desktop (${{ matrix.label }})

            Built with Tauri v2 + Svelte. Shared Rust conversion core with the Android app.

            ### Install
            - **Windows**: run the `.exe` installer or `.msi`
            - **Linux**: run the `.AppImage` (no install needed) or install the `.deb`
            - **macOS**: open the `.dmg` and drag to Applications

            ### Features
            - Single SVG conversion with side-by-side preview
            - Batch ZIP conversion with per-file progress
            - Settings: preview resolution, dark mode
            - Fully offline — no network requests during conversion
          files: /tmp/release-artifacts/*
          fail_on_unmatched_files: true
