# Builds the Tauri desktop app for Windows, Linux, macOS + GitHub Release.
name: desktop

on:
  push:
    paths: [ "tauri/**", "svg-converter-core/**", ".github/workflows/desktop.yml" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            bundles: nsis,msi
            artifacts: |
              tauri/src-tauri/target/release/bundle/nsis/*.exe
              tauri/src-tauri/target/release/bundle/msi/*.msi
          - os: ubuntu-22.04
            label: linux
            bundles: appimage,deb
            artifacts: |
              tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              tauri/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            label: macos
            bundles: dmg
            artifacts: |
              tauri/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build Tauri app
        working-directory: tauri
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('tauri/src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (${{ matrix.label }})
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — ${{ matrix.label }}"
          body: |
            ## Watermelon Vector Converter — Desktop (${{ matrix.label }})

            ### Install
            - **Windows**: download and run the `.exe` (NSIS installer) or `.msi`
            - **Linux**: download the `.AppImage` (portable, no install needed) or `.deb`
            - **macOS**: download and open the `.dmg`

            Built with Tauri v2 + Svelte. Shared Rust conversion core with the Android app.
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: true