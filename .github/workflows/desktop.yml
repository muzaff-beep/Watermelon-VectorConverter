# Builds Tauri desktop app (converter, embedding viewer as externalBin) for
# Windows, Linux, macOS + GitHub Releases. One installer per platform.
name: desktop

on:
  push:
    paths: [ "tauri/**", "viewer/**", "svg-converter-core/**", ".github/workflows/desktop.yml" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            bundles: nsis,msi
            target: x86_64-pc-windows-msvc
            viewer_ext: .exe
          - os: ubuntu-22.04
            label: Linux
            bundles: appimage,deb
            target: x86_64-unknown-linux-gnu
            viewer_ext: ""
          - os: macos-latest
            label: macOS
            bundles: dmg
            target: x86_64-apple-darwin
            viewer_ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # ── Step 1: build the viewer as a plain Rust binary (no separate bundle) ──
      - name: Install viewer frontend dependencies
        working-directory: viewer
        run: npm install

      - name: Build viewer frontend
        working-directory: viewer
        run: npm run build

      - name: Build viewer binary
        working-directory: viewer/src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      # ── Step 2: stage the viewer binary where Tauri's externalBin expects it ──
      - name: Stage viewer binary for externalBin
        shell: bash
        run: |
          mkdir -p tauri/src-tauri/binaries
          cp "viewer/src-tauri/target/${{ matrix.target }}/release/wvgc-viewer${{ matrix.viewer_ext }}" \
             "tauri/src-tauri/binaries/wvgc-viewer-${{ matrix.target }}${{ matrix.viewer_ext }}"

      # ── Step 3: build the converter — Tauri embeds the staged viewer binary ──
      - name: Install converter frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build converter (embeds viewer via externalBin)
        working-directory: tauri
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('tauri/src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List bundle outputs
        shell: bash
        run: |
          find target -type f \( \
            -name "*.exe" -o -name "*.msi" -o \
            -name "*.AppImage" -o -name "*.deb" -o \
            -name "*.dmg" \) -path "*/bundle/*" | sort

      - name: Upload release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter — Desktop (${{ matrix.label }})

            Single installer includes:
            - **Converter** — SVG → VectorDrawable conversion
            - **Viewer** — registered as the default `.svg` handler; double-click any SVG to preview it instantly

            Both share the same Rust conversion core.
          files: |
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi
          fail_on_unmatched_files: true

      - name: Upload release (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter — Desktop (${{ matrix.label }})

            Single package includes the converter and the bundled viewer binary.
          files: |
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/deb/*.deb
          fail_on_unmatched_files: true

      - name: Upload release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ matrix.label }}
          name: "Watermelon Vector Converter ${{ steps.version.outputs.version }} — Desktop (${{ matrix.label }})"
          body: |
            ## Watermelon Vector Converter — Desktop (${{ matrix.label }})

            Single package includes the converter and the bundled viewer binary.
          files: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
